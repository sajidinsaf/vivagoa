# Viva Goa Restaurant - Application Configuration
spring.application.name=vivagoa

# External properties (sensitive credentials stored outside document root)
spring.config.import=optional:file:/home/ifaru02/vivagoa/vivagoa.properties

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server
server.servlet.context-path=/
server.port=8080

# Gallery image upload directory
app.upload.dir=uploads/gallery
