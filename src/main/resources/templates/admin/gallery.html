<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Manage Gallery')}">
    <title>Gallery - Viva Goa Admin</title>
</head>
<body>

<div class="admin-wrapper">
    <!-- Sidebar -->
    <nav class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a th:href="@{/}" class="d-flex align-items-center text-decoration-none">
                <img th:src="@{/images/gallery/logo.jpg}" alt="Viva Goa" style="height:35px; border-radius:4px;"/>
                <span class="ms-2" style="color:var(--accent); font-family:'Playfair Display',serif; font-weight:700; font-size:1.1rem;">Viva Goa</span>
            </a>
            <small class="text-white-50 d-block mt-1">Admin Panel</small>
        </div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a th:href="@{/admin/reservations}"><i class="fas fa-calendar-check"></i> Reservations</a></li>
            <li class="active"><a th:href="@{/admin/gallery}"><i class="fas fa-images"></i> Gallery</a></li>
            <li><a th:href="@{/admin/menu}"><i class="fas fa-utensils"></i> Menu</a></li>
            <li><a th:href="@{/admin/contact}"><i class="fas fa-address-card"></i> Contact Info</a></li>
            <li><a th:href="@{/admin/messages}"><i class="fas fa-envelope"></i> Messages</a></li>
        </ul>
        <div class="sidebar-footer">
            <a th:href="@{/admin/logout}" class="text-white-50 text-decoration-none" style="font-size:.85rem;">
                <i class="fas fa-sign-out-alt me-1"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="btn btn-sm btn-outline-secondary d-lg-none me-3" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h4 class="mb-0">Gallery Management</h4>
            <div class="ms-auto">
                <button class="btn btn-sm btn-primary-vg" data-bs-toggle="modal" data-bs-target="#uploadModal">
                    <i class="fas fa-plus me-1"></i> Add Image
                </button>
            </div>
        </div>

        <div class="admin-body">
            <!-- Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage}">Success</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <i class="fas fa-exclamation-circle me-1"></i> <span th:text="${errorMessage}">Error</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <!-- Gallery Grid -->
            <div class="row g-4" th:if="${images != null and !images.isEmpty()}">
                <div class="col-xl-3 col-lg-4 col-md-6" th:each="img : ${images}">
                    <div class="admin-gallery-card">
                        <div class="admin-gallery-img">
                            <img th:src="@{'/images/gallery/' + ${img.fileName}}" th:alt="${img.title}" class="img-fluid"/>
                            <div class="admin-gallery-overlay">
                                <button class="btn btn-sm btn-warning me-1" data-bs-toggle="modal"
                                        th:data-bs-target="'#editModal' + ${img.id}"
                                        title="Edit">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <form th:action="@{/admin/gallery/{id}/delete(id=${img.id})}" method="post" style="display:inline;" onsubmit="return confirm('Delete this image?')">
                                    <button type="submit" class="btn btn-sm btn-danger" title="Delete"><i class="fas fa-trash-alt"></i></button>
                                </form>
                            </div>
                        </div>
                        <div class="p-2">
                            <h6 class="mb-0" style="font-size:.85rem;" th:text="${img.title}">Title</h6>
                            <small class="text-muted" th:text="${img.category}">Category</small>
                        </div>
                    </div>
                </div>
            </div>

            <div th:if="${images == null or images.isEmpty()}" class="text-center py-5">
                <i class="fas fa-images fa-3x text-muted mb-3" style="display:block;"></i>
                <h5 class="text-muted">No images yet</h5>
                <p class="text-muted">Click "Add Image" to upload your first gallery image.</p>
            </div>
        </div>
    </main>
</div>

<!-- Upload Modal -->
<div class="modal fade" id="uploadModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="fas fa-cloud-upload-alt me-2"></i>Upload Image</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form th:action="@{/admin/gallery}" method="post" enctype="multipart/form-data">
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label fw-500">Image File <span class="text-danger">*</span></label>
                        <input type="file" class="form-control" name="imageFile" accept="image/*" required />
                        <small class="text-muted">Max size: 10MB. Supported: JPG, PNG, WebP</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Title <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" name="title" placeholder="Image title" required />
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Description</label>
                        <textarea class="form-control" name="description" rows="2" placeholder="Brief description"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-500">Category <span class="text-danger">*</span></label>
                        <select class="form-select" name="category" required>
                            <option value="">Select category</option>
                            <option value="Food">Food</option>
                            <option value="Ambiance">Ambiance</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary-vg">
                        <i class="fas fa-upload me-1"></i>Upload
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- Edit Modals -->
<div th:each="img : ${images}">
    <div class="modal fade" th:id="'editModal' + ${img.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-edit me-2"></i>Edit Image</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/gallery/{id}/update(id=${img.id})}" method="post">
                    <div class="modal-body">
                        <div class="text-center mb-3">
                            <img th:src="@{'/images/gallery/' + ${img.fileName}}" th:alt="${img.title}" class="img-fluid rounded"
                                 style="max-height:200px;"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-500">Title</label>
                            <input type="text" class="form-control" name="title" th:value="${img.title}" required />
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-500">Description</label>
                            <textarea class="form-control" name="description" rows="2" th:text="${img.description}"></textarea>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-500">Category</label>
                            <select class="form-select" name="category">
                                <option value="Food" th:selected="${img.category == 'Food'}">Food</option>
                                <option value="Ambiance" th:selected="${img.category == 'Ambiance'}">Ambiance</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Display Order</label>
                            <input type="number" class="form-control" name="displayOrder" th:value="${img.displayOrder}"/>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Active</label>
                            <select class="form-select" name="active">
                                <option value="true" th:selected="${img.active}">Active</option>
                                <option value="false" th:selected="${!img.active}">Inactive</option>
                            </select>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary-vg">
                            <i class="fas fa-save me-1"></i>Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle')?.addEventListener('click', function () {
        document.getElementById('adminSidebar').classList.toggle('show');
    });
</script>

<style>
    .admin-wrapper { display:flex; min-height:100vh; }
    .admin-sidebar { width:260px; background:var(--dark); color:#fff; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:1000; transition:transform .3s; }
    .sidebar-header { padding:1.25rem 1.5rem; border-bottom:1px solid rgba(255,255,255,.08); }
    .sidebar-nav { list-style:none; padding:1rem 0; margin:0; flex-grow:1; }
    .sidebar-nav li a { display:flex; align-items:center; padding:.75rem 1.5rem; color:rgba(255,255,255,.6); text-decoration:none; font-size:.92rem; transition:all .3s; border-left:3px solid transparent; }
    .sidebar-nav li a i { width:22px; margin-right:.75rem; }
    .sidebar-nav li a:hover, .sidebar-nav li.active a { color:#fff; background:rgba(var(--primary-rgb),.15); border-left-color:var(--primary); }
    .sidebar-footer { padding:1rem 1.5rem; border-top:1px solid rgba(255,255,255,.08); }
    .admin-content { flex:1; margin-left:260px; background:#f4f6f9; min-height:100vh; }
    .admin-topbar { display:flex; align-items:center; padding:1rem 1.5rem; background:#fff; border-bottom:1px solid #e5e5e5; box-shadow:0 2px 5px rgba(0,0,0,.05); }
    .admin-body { padding:1.5rem; }
    .fw-500 { font-weight:500; }

    .admin-gallery-card {
        background: #fff;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 2px 10px rgba(0,0,0,.06);
        transition: all .3s;
    }
    .admin-gallery-card:hover {
        box-shadow: 0 6px 20px rgba(0,0,0,.12);
    }
    .admin-gallery-img {
        position: relative;
        aspect-ratio: 4/3;
        overflow: hidden;
    }
    .admin-gallery-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    .admin-gallery-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0,0,0,.5);
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        transition: opacity .3s;
    }
    .admin-gallery-card:hover .admin-gallery-overlay {
        opacity: 1;
    }

    @media (max-width:992px) {
        .admin-sidebar { transform:translateX(-100%); }
        .admin-sidebar.show { transform:translateX(0); }
        .admin-content { margin-left:0; }
    }
</style>

</body>
</html>
