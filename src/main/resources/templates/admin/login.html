<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Admin Login')}">
    <title>Admin Login - Viva Goa</title>
</head>
<body style="background:var(--dark); min-height:100vh; display:flex; align-items:center; justify-content:center;">

<div class="login-container">
    <div class="login-card">
        <!-- Logo & Branding -->
        <div class="text-center mb-4">
            <img th:src="@{/images/gallery/logo.jpg}" alt="Viva Goa" class="login-logo"/>
            <h3 class="mt-3 mb-0" style="color:var(--accent); font-family:'Playfair Display',serif; font-weight:700;">Viva Goa</h3>
            <p class="text-muted" style="font-size:.85rem;">Restaurant Administration</p>
        </div>

        <!-- Error Message -->
        <div th:if="${param.error}" class="alert alert-danger py-2 mb-3" role="alert" style="font-size:.9rem;">
            <i class="fas fa-exclamation-triangle me-1"></i> Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-info py-2 mb-3" role="alert" style="font-size:.9rem;">
            <i class="fas fa-sign-out-alt me-1"></i> You have been logged out.
        </div>

        <!-- Login Form -->
        <form th:action="@{/admin/login}" method="post">
            <div class="mb-3">
                <label class="form-label" style="font-weight:500;">Username</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" name="username" class="form-control" placeholder="Enter username"
                           required autofocus />
                </div>
            </div>
            <div class="mb-4">
                <label class="form-label" style="font-weight:500;">Password</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" name="password" class="form-control" placeholder="Enter password" required />
                </div>
            </div>
            <button type="submit" class="btn btn-primary-vg w-100 py-2">
                <i class="fas fa-sign-in-alt me-2"></i>Sign In
            </button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/}" style="color:rgba(255,255,255,.5); font-size:.85rem; text-decoration:none;">
                <i class="fas fa-arrow-left me-1"></i> Back to Website
            </a>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<style>
    .login-container {
        width: 100%;
        max-width: 420px;
        padding: 1rem;
    }
    .login-card {
        background: #222;
        border-radius: 16px;
        padding: 2.5rem;
        box-shadow: 0 20px 60px rgba(0,0,0,.5);
        border: 1px solid rgba(255,255,255,.05);
    }
    .login-logo {
        height: 70px;
        border-radius: 10px;
        box-shadow: 0 4px 15px rgba(0,0,0,.3);
    }
    .login-card .form-label {
        color: rgba(255,255,255,.75);
        font-size: .9rem;
    }
    .login-card .input-group-text {
        background: #333;
        border-color: #444;
        color: var(--primary);
    }
    .login-card .form-control {
        background: #2a2a2a;
        border-color: #444;
        color: #fff;
    }
    .login-card .form-control:focus {
        background: #2a2a2a;
        border-color: var(--primary);
        color: #fff;
        box-shadow: 0 0 0 .2rem rgba(var(--primary-rgb), .2);
    }
    .login-card .form-control::placeholder {
        color: rgba(255,255,255,.3);
    }
</style>

</body>
</html>
