<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Messages')}">
    <title>Messages - Viva Goa Admin</title>
</head>
<body>

<div class="admin-wrapper">
    <!-- Sidebar -->
    <nav class="admin-sidebar" id="adminSidebar">
        <div class="sidebar-header">
            <a th:href="@{/}" class="d-flex align-items-center text-decoration-none">
                <img th:src="@{/images/gallery/logo.jpg}" alt="Viva Goa" style="height:35px; border-radius:4px;"/>
                <span class="ms-2" style="color:var(--accent); font-family:'Playfair Display',serif; font-weight:700; font-size:1.1rem;">Viva Goa</span>
            </a>
            <small class="text-white-50 d-block mt-1">Admin Panel</small>
        </div>
        <ul class="sidebar-nav">
            <li><a th:href="@{/admin/dashboard}"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
            <li><a th:href="@{/admin/reservations}"><i class="fas fa-calendar-check"></i> Reservations</a></li>
            <li><a th:href="@{/admin/gallery}"><i class="fas fa-images"></i> Gallery</a></li>
            <li><a th:href="@{/admin/contact}"><i class="fas fa-address-card"></i> Contact Info</a></li>
            <li class="active">
                <a th:href="@{/admin/messages}"><i class="fas fa-envelope"></i> Messages
                    <span class="badge bg-danger ms-auto" th:if="${unreadCount != null and unreadCount > 0}"
                          th:text="${unreadCount}">0</span>
                </a>
            </li>
        </ul>
        <div class="sidebar-footer">
            <a th:href="@{/admin/logout}" class="text-white-50 text-decoration-none" style="font-size:.85rem;">
                <i class="fas fa-sign-out-alt me-1"></i> Logout
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="admin-content">
        <div class="admin-topbar">
            <button class="btn btn-sm btn-outline-secondary d-lg-none me-3" id="sidebarToggle">
                <i class="fas fa-bars"></i>
            </button>
            <h4 class="mb-0">Contact Messages</h4>
        </div>

        <div class="admin-body">
            <!-- Messages -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show" role="alert">
                <i class="fas fa-check-circle me-1"></i> <span th:text="${successMessage}">Done</span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="admin-card">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th style="width:30px;"></th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Subject</th>
                                <th>Date</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="msg : ${messages}"
                                th:classappend="${!msg.read} ? 'table-active fw-bold' : ''">
                                <td>
                                    <i class="fas fa-circle" style="font-size:.5rem;"
                                       th:if="${!msg.read}" th:style="'color:var(--primary);'"></i>
                                </td>
                                <td th:text="${msg.name}">Name</td>
                                <td>
                                    <a th:href="'mailto:' + ${msg.email}" th:text="${msg.email}" class="text-decoration-none">email</a>
                                </td>
                                <td th:text="${msg.subject}">Subject</td>
                                <td th:text="${#temporals.format(msg.createdAt, 'dd MMM yyyy HH:mm')}">01 Jan 2026</td>
                                <td>
                                    <span class="badge" th:classappend="${msg.read} ? 'bg-secondary' : 'bg-primary'"
                                          th:text="${msg.read} ? 'Read' : 'Unread'">Status</span>
                                </td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary me-1" data-bs-toggle="modal"
                                            th:data-bs-target="'#msgModal' + ${msg.id}" title="View Message">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                    <a th:href="@{/admin/messages/{id}/read(id=${msg.id})}"
                                       class="btn btn-sm btn-outline-success me-1" th:if="${!msg.read}" title="Mark as Read">
                                        <i class="fas fa-check"></i>
                                    </a>
                                    <a th:href="@{/admin/messages/{id}/delete(id=${msg.id})}"
                                       class="btn btn-sm btn-outline-danger"
                                       onclick="return confirm('Delete this message?')" title="Delete">
                                        <i class="fas fa-trash-alt"></i>
                                    </a>
                                </td>
                            </tr>
                            <tr th:if="${messages == null or messages.isEmpty()}">
                                <td colspan="7" class="text-center text-muted py-5">
                                    <i class="fas fa-inbox fa-3x mb-2 d-block"></i>
                                    No messages
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Message View Modals -->
<div th:each="msg : ${messages}">
    <div class="modal fade" th:id="'msgModal' + ${msg.id}" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" th:text="${msg.subject}">Subject</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3 mb-3">
                        <div class="col-sm-6">
                            <label class="form-label text-muted" style="font-size:.8rem;">From</label>
                            <p class="fw-bold mb-0" th:text="${msg.name}">Name</p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted" style="font-size:.8rem;">Email</label>
                            <p class="mb-0">
                                <a th:href="'mailto:' + ${msg.email}" th:text="${msg.email}">email</a>
                            </p>
                        </div>
                        <div class="col-sm-6" th:if="${msg.phone != null and !#strings.isEmpty(msg.phone)}">
                            <label class="form-label text-muted" style="font-size:.8rem;">Phone</label>
                            <p class="mb-0" th:text="${msg.phone}">Phone</p>
                        </div>
                        <div class="col-sm-6">
                            <label class="form-label text-muted" style="font-size:.8rem;">Date</label>
                            <p class="mb-0" th:text="${#temporals.format(msg.createdAt, 'dd MMM yyyy HH:mm')}">Date</p>
                        </div>
                    </div>
                    <hr/>
                    <div class="p-3 rounded" style="background:#f8f9fa;">
                        <p class="mb-0" style="white-space:pre-wrap;" th:text="${msg.message}">Message body</p>
                    </div>
                </div>
                <div class="modal-footer">
                    <a th:href="@{/admin/messages/{id}/read(id=${msg.id})}" class="btn btn-success" th:if="${!msg.read}">
                        <i class="fas fa-check me-1"></i>Mark as Read
                    </a>
                    <a th:href="'mailto:' + ${msg.email} + '?subject=Re: ' + ${msg.subject}" class="btn btn-primary-vg">
                        <i class="fas fa-reply me-1"></i>Reply via Email
                    </a>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    document.getElementById('sidebarToggle')?.addEventListener('click', function () {
        document.getElementById('adminSidebar').classList.toggle('show');
    });

    // Auto-mark as read when viewing modal
    document.querySelectorAll('.modal').forEach(function (modal) {
        modal.addEventListener('shown.bs.modal', function () {
            var id = this.id.replace('msgModal', '');
            var row = document.querySelector('button[data-bs-target="#' + this.id + '"]')?.closest('tr');
            if (row && row.classList.contains('table-active')) {
                // Optional: could auto-mark as read via AJAX here
            }
        });
    });
</script>

<style>
    .admin-wrapper { display:flex; min-height:100vh; }
    .admin-sidebar { width:260px; background:var(--dark); color:#fff; display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; z-index:1000; transition:transform .3s; }
    .sidebar-header { padding:1.25rem 1.5rem; border-bottom:1px solid rgba(255,255,255,.08); }
    .sidebar-nav { list-style:none; padding:1rem 0; margin:0; flex-grow:1; }
    .sidebar-nav li a { display:flex; align-items:center; padding:.75rem 1.5rem; color:rgba(255,255,255,.6); text-decoration:none; font-size:.92rem; transition:all .3s; border-left:3px solid transparent; }
    .sidebar-nav li a i { width:22px; margin-right:.75rem; }
    .sidebar-nav li a:hover, .sidebar-nav li.active a { color:#fff; background:rgba(var(--primary-rgb),.15); border-left-color:var(--primary); }
    .sidebar-footer { padding:1rem 1.5rem; border-top:1px solid rgba(255,255,255,.08); }
    .admin-content { flex:1; margin-left:260px; background:#f4f6f9; min-height:100vh; }
    .admin-topbar { display:flex; align-items:center; padding:1rem 1.5rem; background:#fff; border-bottom:1px solid #e5e5e5; box-shadow:0 2px 5px rgba(0,0,0,.05); }
    .admin-body { padding:1.5rem; }
    .admin-card { background:#fff; border-radius:12px; box-shadow:0 2px 10px rgba(0,0,0,.06); overflow:hidden; }

    @media (max-width:992px) {
        .admin-sidebar { transform:translateX(-100%); }
        .admin-sidebar.show { transform:translateX(0); }
        .admin-content { margin-left:0; }
    }
</style>

</body>
</html>
